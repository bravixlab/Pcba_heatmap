<style>
:root{--bg:#0d1117;--panel:#141c26;--border:rgba(255,255,255,.09);--text:#d0d8e4;--dim:#5a6a7e;--red:#d93025;--green:#1e9952;--yellow:#d4900a;--accent:#4ea6ff;--hdr:#070c14}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}
header{background:var(--hdr);border-bottom:1px solid var(--border);padding:7px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
header h1{font-size:.82rem;font-weight:700;letter-spacing:1.4px;color:#fff}
.badge{font-family:'Share Tech Mono',monospace;font-size:.58rem;padding:2px 8px;border-radius:3px;border:1px solid}
.b-blue{background:rgba(78,166,255,.1);border-color:rgba(78,166,255,.35);color:#4ea6ff}
.b-red{background:rgba(217,48,37,.12);border-color:rgba(217,48,37,.4);color:#ff6b5b}
.b-ro{background:rgba(212,144,10,.1);border-color:rgba(212,144,10,.35);color:#d4900a}
.fwrap{position:relative;margin-left:auto}

.fbox:hover{background:rgba(78,166,255,.14)}
.fdrop{position:absolute;top:calc(100% + 5px);right:0;background:#1a2535;border:1px solid var(--border);border-radius:7px;min-width:230px;z-index:100;display:none;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.fdrop.open{display:block}
.fdi{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;font-size:.65rem;font-family:'Share Tech Mono',monospace;color:var(--dim)}
.fdi:hover,.fdi.act{background:rgba(78,166,255,.1);color:var(--text)}
.fdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.fcount{margin-left:auto;font-size:.58rem;color:var(--dim)}
.main{flex:1;display:flex;overflow:hidden}
.bwrap{flex:1;position:relative;background:#9ea4ae;overflow:hidden;cursor:default}
#mc,#ov{position:absolute;top:0;left:0;display:block}
#ov{pointer-events:none}
.rpanel{width:310px;flex-shrink:0;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.rh{font-family:'Share Tech Mono',monospace;font-size:.58rem;font-weight:700;color:var(--dim);padding:6px 10px;border-bottom:1px solid var(--border);letter-spacing:.5px;flex-shrink:0}
.iarea{padding:10px;border-bottom:1px solid var(--border);flex-shrink:0;min-height:72px}
.iref{font-size:1rem;font-weight:700;color:#fff;font-family:'Share Tech Mono',monospace;letter-spacing:1px}
.irem{font-size:.68rem;color:var(--dim);margin:3px 0 7px}
.srow{display:flex;gap:5px;flex-wrap:wrap}
.st{font-family:'Share Tech Mono',monospace;font-size:.58rem;padding:2px 6px;border-radius:3px;border:1px solid}
.parea{flex:1;position:relative;display:flex;align-items:center;justify-content:center;background:#050a10;overflow:hidden;min-height:160px;cursor:pointer}
.parea img{max-width:100%;max-height:100%;object-fit:contain;display:block}
.pempty{text-align:center;color:var(--dim);font-size:.68rem;line-height:2}
.pgrid{overflow-y:auto;max-height:220px;border-top:1px solid var(--border)}
.gi{display:flex;align-items:center;gap:7px;padding:5px 9px;cursor:pointer;border-bottom:1px solid var(--border);transition:.12s}
.gi:hover{background:rgba(255,255,255,.05)}
.gi.sel{background:rgba(78,166,255,.1)}
.gi.ghost{opacity:.3;pointer-events:none}
.gdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.gref{font-family:'Share Tech Mono',monospace;font-size:.66rem;font-weight:700;color:#4ea6ff;min-width:50px}
.grem{font-size:.62rem;color:var(--dim);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gf{font-family:'Share Tech Mono',monospace;font-size:.63rem;font-weight:700}
.nosel{color:var(--dim);font-size:.65rem;text-align:center;padding:18px;font-family:'Share Tech Mono',monospace}
.xy{position:absolute;bottom:6px;right:8px;font-family:'Share Tech Mono',monospace;font-size:.54rem;color:rgba(255,255,255,.3);pointer-events:none}
/* lightbox */
.lbox{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:999;display:none;align-items:center;justify-content:center;cursor:zoom-out}
.lbox.open{display:flex}
.lbox img{max-width:92vw;max-height:92vh;object-fit:contain;border-radius:4px;box-shadow:0 0 40px rgba(0,0,0,.6)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}

function draw(){
  ctx.clearRect(0,0,mc.width,mc.height);ctx.fillStyle='#9ea4ae';ctx.fillRect(0,0,mc.width,mc.height);
  ctx.save();ctx.translate(panX,panY);ctx.scale(zoom,zoom);
  var BW=pcbImg?pcbImg.naturalWidth:mc.width/zoom,BH=pcbImg?pcbImg.naturalHeight:mc.height/zoom;
  if(pcbImg){ctx.drawImage(pcbImg,0,0,BW,BH);}else{ctx.fillStyle='#1a2535';ctx.fillRect(0,0,BW,BH);}
  DATA.comps.forEach(function(c){
    if(filterVal&&(c.remarks||'').toLowerCase()!==filterVal.toLowerCase())return;
    if(c.fails<=0)return;
    var cx=c.bx+c.bw/2,cy=c.by+c.bh/2,base=Math.max(Math.abs(c.bw),Math.abs(c.bh))/2,r=base+30+c.fails*12;

  });
  DATA.comps.forEach(function(c){
    var isF=filterVal&&(c.remarks||'').toLowerCase()!==filterVal.toLowerCase();
    var isSel=selId===c.id;

    ctx.strokeStyle=isSel?'#1a73e8':(c.color||'#ff0000');ctx.lineWidth=(isSel?2.8:2.2)/zoom;
    if(isSel)ctx.setLineDash([5/zoom,2.5/zoom]);
    mkp(ctx,c.bx,c.by,c.bw,c.bh,c.shape);ctx.stroke();ctx.setLineDash([]);ctx.restore();
    var cx=c.bx+c.bw/2,cy=c.by+c.bh/2,fs=Math.max(8,Math.min(14,Math.abs(c.bw)*0.20))/zoom;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font='bold '+fs+'px Share Tech Mono';
    ctx.strokeStyle='rgba(255,255,255,.95)';ctx.lineWidth=3/zoom;ctx.strokeText(c.ref,cx,cy);
    ctx.fillStyle='#080808';ctx.fillText(c.ref,cx,cy);
    if(c.remarks&&!isF){var fsR=Math.max(6,fs*.70),txt=c.remarks.length>18?c.remarks.slice(0,17)+'\u2026':c.remarks;ctx.font=fsR+'px Share Tech Mono';ctx.strokeStyle='rgba(255,255,255,.9)';ctx.lineWidth=2.5/zoom;ctx.strokeText(txt,cx,cy+fs*1.25);ctx.fillStyle='rgba(15,15,15,.88)';ctx.fillText(txt,cx,cy+fs*1.25);}
    if(c.fails>0&&!isF){var fr=16/zoom,fx=c.bx+c.bw+fr*.3,fy=c.by-fr*.3;ctx.beginPath();ctx.arc(fx,fy,fr,0,Math.PI*2);ctx.fillStyle='#d93025';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1.5/zoom;ctx.stroke();ctx.font='bold '+(10/zoom)+'px Share Tech Mono';ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(c.fails>99?'99+':String(c.fails),fx,fy);}
  });

function drawOv(){
  ovCtx.clearRect(0,0,ov.width,ov.height);
  if(!selId)return;
  var c=DATA.comps.find(function(x){return x.id===selId;});if(!c)return;
  var cp=b2s(c.bx+c.bw/2,c.by+c.bh/2);
  var sx=Math.max(10,Math.min(ov.width-10,cp.x)),sy=Math.max(10,Math.min(ov.height-10,cp.y));
  var ex=ov.width-4;
  var parea=document.getElementById('parea'),wr=bwrap.getBoundingClientRect(),pr=parea.getBoundingClientRect();
  var ey=(pr.top+pr.height/2)-wr.top;
  ovCtx.save();
  ovCtx.setLineDash([6,3]);ovCtx.strokeStyle='rgba(255,210,0,.90)';ovCtx.lineWidth=2.5;
  var mx=(sx+ex)/2;
  ovCtx.beginPath();ovCtx.moveTo(sx,sy);ovCtx.bezierCurveTo(mx,sy,mx,ey,ex,ey);ovCtx.stroke();
  ovCtx.setLineDash([]);

function ht(sx,sy){
  return DATA.comps.slice().reverse().find(function(c){
    var p1=b2s(c.bx,c.by),p2=b2s(c.bx+c.bw,c.by+c.bh);
    var mnX=Math.min(p1.x,p2.x)-6,mxX=Math.max(p1.x,p2.x)+6,mnY=Math.min(p1.y,p2.y)-6,mxY=Math.max(p1.y,p2.y)+6;

function buildGrid(){

  var comps=[...DATA.comps].sort(function(a,b){return b.fails-a.fails;});

function buildFilter(){

bwrap.addEventListener('click',function(e){var r=bwrap.getBoundingClientRect();var hit=ht(e.clientX-r.left,e.clientY-r.top);if(hit)sel(hit.id);else{selId=null;updInfo();draw();drawOv();buildGrid();}});
bwrap.addEventListener('mousemove',function(e){
  var r=bwrap.getBoundingClientRect();var bp=s2b(e.clientX-r.left,e.clientY-r.top);
  document.getElementById('xy').textContent='X:'+Math.round(bp.x)+' Y:'+Math.round(bp.y);
  if(panning){panX=e.clientX-panDX;panY=e.clientY-panDY;draw();drawOv();}
});
bwrap.addEventListener('mousedown',function(e){if(e.button===1||e.button===2){e.preventDefault();panning=true;panDX=e.clientX-panX;panDY=e.clientY-panY;bwrap.style.cursor='grabbing';}});
bwrap.addEventListener('mouseup',function(e){if(panning){panning=false;bwrap.style.cursor='default';}});
bwrap.addEventListener('wheel',function(e){e.preventDefault();var r=bwrap.getBoundingClientRect(),sx=e.clientX-r.left,sy=e.clientY-r.top,f=e.deltaY<0?1.13:.89,nz=Math.max(.05,Math.min(20,zoom*f));panX=sx-(sx-panX)*(nz/zoom);panY=sy-(sy-panY)*(nz/zoom);zoom=nz;draw();drawOv();},{passive:false});
bwrap.addEventListener('contextmenu',function(e){e.preventDefault();});
function openLbox(){var c=DATA.comps.find(function(x){return x.id===selId;});if(!c||!c.photo)return;document.getElementById('limg').src=c.photo;document.getElementById('lbox').classList.add('open');}
function closeLbox(){document.getElementById('lbox').classList.remove('open');}
window.addEventListener('resize',function(){setTimeout(resize,50);});
(function(){var img=new Image();img.onload=function(){pcbImg=img;resize();buildGrid();buildFilter();};img.src=DATA.pcbImg;})();
</script>
